<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="Neural network nodes">
  <rect width="300" height="300" fill="#E0E6FF"></rect>
  <!-- Conexiones entre nodos (fondo) -->
  <g stroke="#0E1116" stroke-width="1.5" fill="none" opacity="0.32">
    <path d="M70 90 L150 150 L230 90"></path>
    <path d="M70 150 L150 150 L230 150"></path>
    <path d="M70 210 L150 150 L230 210"></path>
    <path d="M70 90 L150 210 L230 90"></path>
    <path d="M70 210 L150 210 L230 210"></path>
  </g>
  <!-- Nodos: limpieza de paleta para matchear la
       animación hero. Antes usábamos 4 colores de OTROS temas (naranja
       fisica, amarillo espacio, púrpura neuro, verde bio) que rompían
       la coherencia "un tema = una paleta". Ahora todos los fills son
       de la familia IA: cobalto (#2E4BE0), deep cobalto (#1E34B0), cream
       neutro (#FDFAF2), ink neutro (#0E1116). Mismo layout, mismo peso
       visual, ahora consistente con el resto del sistema. -->
  <g>
    <circle cx="70" cy="90" r="12" fill="#2E4BE0" stroke="#0E1116" stroke-width="2"></circle>
    <circle cx="70" cy="150" r="12" fill="#FDFAF2" stroke="#0E1116" stroke-width="2"></circle>
    <circle cx="70" cy="210" r="12" fill="#1E34B0" stroke="#0E1116" stroke-width="2"></circle>
    <circle cx="150" cy="150" r="20" fill="#0E1116"></circle>
    <circle cx="150" cy="150" r="8" fill="#2E4BE0"></circle>
    <circle cx="150" cy="210" r="12" fill="#1E34B0" stroke="#0E1116" stroke-width="2"></circle>
    <circle cx="230" cy="90" r="12" fill="#FDFAF2" stroke="#0E1116" stroke-width="2"></circle>
    <circle cx="230" cy="150" r="12" fill="#2E4BE0" stroke="#0E1116" stroke-width="2"></circle>
    <circle cx="230" cy="210" r="12" fill="#FDFAF2" stroke="#0E1116" stroke-width="2"></circle>
  </g>
</svg>
