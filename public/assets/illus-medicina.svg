<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="Placa de Petri con colonias bacterianas">
  <!-- Fondo: soft de medicina -->
  <rect width="300" height="300" fill="#FADCEA"></rect>

  <!-- Placa de Petri: círculo principal con borde ink + anillo interior
       sutil que da la sensación de "borde del vidrio" -->
  <circle cx="150" cy="150" r="110" fill="#FDFAF2" stroke="#0E1116" stroke-width="2.5"></circle>
  <circle cx="150" cy="150" r="102" fill="none" stroke="#0E1116" stroke-width="1" opacity="0.25"></circle>

  <!-- 5 colonias de tamaños variados, distribuidas dentro de la placa.
       Cada colonia = 3 capas concéntricas (halo transparente → anillo
       medio → núcleo sólido) + punto ink central. Simula cómo crece un
       cultivo bacteriano: denso adentro, disperso afuera.
       Paleta: sólo los 3 rosas del tema + ink. -->

  <!-- Colonia grande (centro-abajo) -->
  <g>
    <circle cx="148" cy="188" r="30" fill="#E03E8C" opacity="0.22"></circle>
    <circle cx="148" cy="188" r="22" fill="#E03E8C" opacity="0.5"></circle>
    <circle cx="148" cy="188" r="14" fill="#B32168" stroke="#0E1116" stroke-width="1.5"></circle>
    <circle cx="148" cy="188" r="5" fill="#0E1116"></circle>
  </g>

  <!-- Colonia mediana (arriba-izquierda) -->
  <g>
    <circle cx="108" cy="112" r="22" fill="#E03E8C" opacity="0.22"></circle>
    <circle cx="108" cy="112" r="16" fill="#E03E8C" opacity="0.5"></circle>
    <circle cx="108" cy="112" r="10" fill="#B32168" stroke="#0E1116" stroke-width="1.5"></circle>
    <circle cx="108" cy="112" r="3.5" fill="#0E1116"></circle>
  </g>

  <!-- Colonia mediana (derecha-centro) -->
  <g>
    <circle cx="205" cy="135" r="19" fill="#E03E8C" opacity="0.22"></circle>
    <circle cx="205" cy="135" r="13" fill="#E03E8C" opacity="0.5"></circle>
    <circle cx="205" cy="135" r="8" fill="#B32168" stroke="#0E1116" stroke-width="1.5"></circle>
    <circle cx="205" cy="135" r="3" fill="#0E1116"></circle>
  </g>

  <!-- Colonia chica (arriba-derecha) -->
  <g>
    <circle cx="175" cy="82" r="14" fill="#E03E8C" opacity="0.22"></circle>
    <circle cx="175" cy="82" r="9" fill="#E03E8C" opacity="0.5"></circle>
    <circle cx="175" cy="82" r="5" fill="#B32168" stroke="#0E1116" stroke-width="1.5"></circle>
    <circle cx="175" cy="82" r="2" fill="#0E1116"></circle>
  </g>

  <!-- Colonia chica (abajo-derecha) -->
  <g>
    <circle cx="212" cy="212" r="13" fill="#E03E8C" opacity="0.22"></circle>
    <circle cx="212" cy="212" r="8" fill="#E03E8C" opacity="0.5"></circle>
    <circle cx="212" cy="212" r="4.5" fill="#B32168" stroke="#0E1116" stroke-width="1.5"></circle>
    <circle cx="212" cy="212" r="1.8" fill="#0E1116"></circle>
  </g>
</svg>
